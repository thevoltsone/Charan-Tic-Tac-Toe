<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tic Tac Toe</title>
    <meta name="description"
        content="A beautifully designed, interactive Tic Tac Toe web application with dark mode and smooth animations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Tic <span class="highlight">Tac</span> Toe</h1>
            <div class="status" id="status" aria-live="polite">Player <span id="current-player"
                    class="player-x">X</span>'s turn</div>
        </header>

        <main class="board-container">
            <div class="board" id="board" role="grid">
                <div class="cell" data-index="0" role="gridcell" aria-label="Cell 0, empty" tabindex="0"></div>
                <div class="cell" data-index="1" role="gridcell" aria-label="Cell 1, empty" tabindex="0"></div>
                <div class="cell" data-index="2" role="gridcell" aria-label="Cell 2, empty" tabindex="0"></div>
                <div class="cell" data-index="3" role="gridcell" aria-label="Cell 3, empty" tabindex="0"></div>
                <div class="cell" data-index="4" role="gridcell" aria-label="Cell 4, empty" tabindex="0"></div>
                <div class="cell" data-index="5" role="gridcell" aria-label="Cell 5, empty" tabindex="0"></div>
                <div class="cell" data-index="6" role="gridcell" aria-label="Cell 6, empty" tabindex="0"></div>
                <div class="cell" data-index="7" role="gridcell" aria-label="Cell 7, empty" tabindex="0"></div>
                <div class="cell" data-index="8" role="gridcell" aria-label="Cell 8, empty" tabindex="0"></div>
            </div>

            <div class="winner-overlay hide" id="winner-overlay">
                <h2 id="winner-message">Player X Wins!</h2>
                <button id="restart-btn" class="btn">Play Again</button>
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="btn-secondary">Reset Game</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
